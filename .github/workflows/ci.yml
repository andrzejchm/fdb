name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (fdb)
        run: dart pub get

      - name: Install dependencies (fdb_helper)
        run: flutter pub get
        working-directory: packages/fdb_helper

      - name: Format check (fdb)
        run: dart format --set-exit-if-changed --page-width 120 --trailing-commas preserve lib/ bin/ test/

      - name: Format check (fdb_helper)
        run: dart format --set-exit-if-changed --page-width 120 --trailing-commas preserve lib/
        working-directory: packages/fdb_helper

      - name: Analyze (fdb)
        run: dart analyze lib/ bin/ test/

      - name: Analyze (fdb_helper)
        run: flutter analyze --suppress-analytics
        working-directory: packages/fdb_helper

      - name: Test (fdb)
        run: dart test
