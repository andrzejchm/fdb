version: '3'

silent: true

vars:
  FDB: 'dart run {{.ROOT_DIR}}/bin/fdb.dart'
  TEST_APP: '{{.ROOT_DIR}}/example/test_app'

tasks:
  # ---------------------------------------------------------------------------
  # Setup
  # ---------------------------------------------------------------------------
  setup:
    desc: Install dependencies and prepare the test app
    cmds:
      - dart pub get
      - cmd: flutter pub get
        dir: 'packages/fdb_helper'
      - cmd: flutter pub get
        dir: '{{.TEST_APP}}'

  # ---------------------------------------------------------------------------
  # Device detection
  # ---------------------------------------------------------------------------
  detect-device:
    desc: Auto-detect a connected device ID (first device reported by fdb devices)
    cmds:
      - |
        DEVICE=$({{.FDB}} devices 2>/dev/null \
          | grep '^DEVICE_ID=' \
          | head -1 \
          | sed 's/DEVICE_ID=\([^ ]*\).*/\1/')
        if [ -z "$DEVICE" ]; then
          echo "ERROR: No device found. Start a simulator or connect a device." >&2
          exit 1
        fi
        echo "$DEVICE"

  # ---------------------------------------------------------------------------
  # Individual fdb command tests
  # ---------------------------------------------------------------------------
  test:devices:
    desc: "List connected devices"
    cmds:
      - |
        echo "==> Listing devices"
        OUTPUT=$({{.FDB}} devices 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb devices exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "DEVICE_ID="; then
          echo "PASS: fdb devices"
        else
          echo "FAIL: fdb devices - no DEVICE_ID= lines in output" >&2
          exit 1
        fi

  test:launch:
    desc: "Launch the test app on a device (set DEVICE or auto-detect)"
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        echo "==> Launching test app on device: {{.DEVICE}}"
        OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb launch exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "APP_STARTED"; then
          echo "PASS: fdb launch"
        else
          echo "FAIL: fdb launch - APP_STARTED not found in output" >&2
          exit 1
        fi

  test:launch-verbose:
    desc: "Launch the test app with --verbose and verify APP_STARTED is emitted"
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        echo "==> Kill any running app before verbose launch"
        {{.FDB}} kill 2>&1 || true

        echo "==> Launching test app with --verbose on device: {{.DEVICE}}"
        OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" --verbose 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb launch --verbose exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "APP_STARTED"; then
          echo "PASS: fdb launch --verbose"
        else
          echo "FAIL: fdb launch --verbose - APP_STARTED not found in output" >&2
          exit 1
        fi

        echo "==> Kill app after verbose launch test"
        {{.FDB}} kill 2>&1 || true

        echo "==> Re-launching test app (normal mode) to restore smoke state"
        OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: re-launch after verbose test exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "APP_STARTED"; then
          echo "PASS: re-launch after verbose test"
        else
          echo "FAIL: re-launch after verbose test - APP_STARTED not found in output" >&2
          exit 1
        fi

  test:status:
    desc: Check app status (expects a running app)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Checking app status"
        OUTPUT=$({{.FDB}} status 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "RUNNING=true"; then
          echo "PASS: fdb status"
        else
          echo "FAIL: fdb status - expected RUNNING=true" >&2
          exit 1
        fi

  test:doctor:
    desc: Run pre-flight environment checks (expects a running app with fdb_helper)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        # Normalise raw output: the dart run build-hook preamble has no trailing
        # newline so it can run onto the first DOCTOR_ token on the same physical
        # line.  Split every DOCTOR_ prefix onto its own line so all ^-anchored
        # greps work correctly regardless of the runner environment.
        normalize() { sed "s/DOCTOR_/"$'\\\nDOCTOR_'"/g"; }

        echo "==> Running doctor checks"
        RAW=$({{.FDB}} doctor 2>&1)
        EXIT_CODE=$?
        OUTPUT=$(echo "$RAW" | normalize)
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb doctor exited with code $EXIT_CODE" >&2
          exit 1
        fi
        CHECK_COUNT=$(echo "$OUTPUT" | grep -c '^DOCTOR_CHECK=')
        if [ "$CHECK_COUNT" -ne 5 ]; then
          echo "FAIL: fdb doctor - expected 5 DOCTOR_CHECK lines, got $CHECK_COUNT" >&2
          exit 1
        fi
        ACTUAL_ORDER=$(echo "$OUTPUT" | grep '^DOCTOR_CHECK=' | sed 's/^DOCTOR_CHECK=\([^ ]*\).*/\1/' | tr '\n' ' ' | sed 's/ $//')
        EXPECTED_ORDER="app_running vm_service fdb_helper platform_tools device"
        if [ "$ACTUAL_ORDER" != "$EXPECTED_ORDER" ]; then
          echo "FAIL: fdb doctor - expected check order '$EXPECTED_ORDER', got '$ACTUAL_ORDER'" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q '^DOCTOR_CHECK=app_running STATUS=pass$'; then
          echo "FAIL: fdb doctor - app_running pass line missing or malformed" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q '^DOCTOR_CHECK=vm_service STATUS=pass VM_SERVICE_URI='; then
          echo "FAIL: fdb doctor - vm_service pass line missing VM_SERVICE_URI" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q '^DOCTOR_CHECK=fdb_helper STATUS=pass$'; then
          echo "FAIL: fdb doctor - fdb_helper pass line missing or malformed" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -Eq '^DOCTOR_CHECK=platform_tools STATUS=(pass|warn) TOOLS='; then
          echo "FAIL: fdb doctor - platform_tools line missing status or TOOLS" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q '^DOCTOR_CHECK=platform_tools STATUS=warn'; then
          if ! echo "$OUTPUT" | grep -q '^DOCTOR_CHECK=platform_tools STATUS=warn .*MISSING=.*HINT=.*missing'; then
            echo "FAIL: fdb doctor - platform_tools warning missing MISSING or HINT" >&2
            exit 1
          fi
        fi
        if ! echo "$OUTPUT" | grep -q '^DOCTOR_CHECK=device STATUS=pass DEVICE_ID=.* PLATFORM='; then
          echo "FAIL: fdb doctor - device pass line missing DEVICE_ID or PLATFORM" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q '^DOCTOR_SUMMARY=pass CHECKS=5 FAILED=0$'; then
          echo "FAIL: fdb doctor - passing summary missing or malformed" >&2
          exit 1
        fi

        echo "==> Scenario: dead PID (app_running=fail)"
        ORIGINAL_PID=$(cat .fdb/fdb.pid)
        restore_pid() { printf '%s' "$ORIGINAL_PID" > .fdb/fdb.pid; }
        trap restore_pid EXIT
        printf '999999' > .fdb/fdb.pid
        FAILURE_RAW=$({{.FDB}} doctor 2>&1)
        FAILURE_EXIT_CODE=$?
        restore_pid
        trap - EXIT
        FAILURE_OUTPUT=$(echo "$FAILURE_RAW" | normalize)
        echo "$FAILURE_OUTPUT"
        if [ $FAILURE_EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb doctor returned non-zero for failed checks: $FAILURE_EXIT_CODE" >&2
          exit 1
        fi
        if ! echo "$FAILURE_OUTPUT" | grep -q '^DOCTOR_CHECK=app_running STATUS=fail HINT='; then
          echo "FAIL: fdb doctor - app_running failure line missing HINT" >&2
          exit 1
        fi
        if ! echo "$FAILURE_OUTPUT" | grep -q '^DOCTOR_CHECK=vm_service STATUS=fail HINT='; then
          echo "FAIL: fdb doctor - vm_service failure line missing HINT" >&2
          exit 1
        fi
        if ! echo "$FAILURE_OUTPUT" | grep -q '^DOCTOR_CHECK=fdb_helper STATUS=fail HINT='; then
          echo "FAIL: fdb doctor - fdb_helper failure line missing HINT" >&2
          exit 1
        fi
        if ! echo "$FAILURE_OUTPUT" | grep -q '^DOCTOR_SUMMARY=fail CHECKS=5 FAILED=3$'; then
          echo "FAIL: fdb doctor - failed summary missing or warnings counted as failures" >&2
          exit 1
        fi

        echo "==> Scenario: stale VM URI while PID is alive (vm_service=fail)"
        ORIGINAL_URI=$(cat .fdb/vm_uri.txt)
        restore_uri() { printf '%s' "$ORIGINAL_URI" > .fdb/vm_uri.txt; }
        trap restore_uri EXIT
        printf 'ws://127.0.0.1:1/stale=/ws' > .fdb/vm_uri.txt
        STALE_RAW=$({{.FDB}} doctor 2>&1)
        STALE_EXIT_CODE=$?
        restore_uri
        trap - EXIT
        STALE_OUTPUT=$(echo "$STALE_RAW" | normalize)
        echo "$STALE_OUTPUT"
        if [ $STALE_EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb doctor returned non-zero for stale URI scenario: $STALE_EXIT_CODE" >&2
          exit 1
        fi
        if ! echo "$STALE_OUTPUT" | grep -q '^DOCTOR_CHECK=app_running STATUS=pass$'; then
          echo "FAIL: fdb doctor stale-URI - app_running should still pass" >&2
          exit 1
        fi
        if ! echo "$STALE_OUTPUT" | grep -q '^DOCTOR_CHECK=vm_service STATUS=fail HINT=App is running'; then
          echo "FAIL: fdb doctor stale-URI - vm_service should fail with app-is-running hint" >&2
          exit 1
        fi
        if ! echo "$STALE_OUTPUT" | grep -q '^DOCTOR_SUMMARY=fail'; then
          echo "FAIL: fdb doctor stale-URI - summary should be fail" >&2
          exit 1
        fi

        echo "PASS: fdb doctor"

  test:reload:
    desc: Hot reload the running app
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Hot reloading"
        OUTPUT=$({{.FDB}} reload 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb reload exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RELOADED"; then
          echo "PASS: fdb reload"
        else
          echo "FAIL: fdb reload - RELOADED not found in output" >&2
          exit 1
        fi

  test:restart:
    desc: Hot restart the running app
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Hot restarting"
        OUTPUT=$({{.FDB}} restart 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb restart exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RESTARTED"; then
          echo "PASS: fdb restart"
        else
          echo "FAIL: fdb restart - RESTARTED not found in output" >&2
          exit 1
        fi

  test:logs:
    desc: Read app logs
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Reading logs (last 10)"
        OUTPUT=$({{.FDB}} logs --last 10 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb logs exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb logs"

  test:logs-tag:
    desc: Read app logs filtered by tag
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Reading logs with --tag fdb_test"
        OUTPUT=$({{.FDB}} logs --tag fdb_test --last 10 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb logs --tag exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb logs --tag"

  test:syslog:
    desc: Read native system logs (Android logcat / iOS syslog / macOS log)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> fdb syslog --since 5m --last 20 (default platform)"
        OUTPUT=$({{.FDB}} syslog --since 5m --last 20 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb syslog exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb syslog"

        echo "==> fdb syslog --since 30s --last 5 (shorter window)"
        OUTPUT=$({{.FDB}} syslog --since 30s --last 5 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb syslog --since 30s exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb syslog --since 30s"

        echo "==> fdb syslog --since 1h --predicate kernel --last 5"
        OUTPUT=$({{.FDB}} syslog --since 1h --predicate kernel --last 5 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        # Only exit code 0 is accepted.
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb syslog --predicate exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb syslog --predicate"

        echo "==> fdb syslog invalid --since format (expect error)"
        set +e
        OUTPUT=$({{.FDB}} syslog --since bad 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ $EXIT_CODE -eq 0 ]; then
          echo "FAIL: fdb syslog --since bad should have failed" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "ERROR:"; then
          echo "PASS: fdb syslog invalid --since rejected"
        else
          echo "FAIL: fdb syslog invalid --since — expected ERROR: in output" >&2
          exit 1
        fi

        echo "==> fdb syslog --follow --last 5 (expect error — combination unsupported)"
        set +e
        OUTPUT=$({{.FDB}} syslog --follow --last 5 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ $EXIT_CODE -eq 0 ]; then
          echo "FAIL: fdb syslog --follow --last should have failed" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "ERROR:"; then
          echo "PASS: fdb syslog --follow --last rejected"
        else
          echo "FAIL: fdb syslog --follow --last — expected ERROR: in output" >&2
          exit 1
        fi

        echo "==> fdb syslog --last 0 (expect error — must be positive)"
        set +e
        OUTPUT=$({{.FDB}} syslog --last 0 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ $EXIT_CODE -eq 0 ]; then
          echo "FAIL: fdb syslog --last 0 should have failed" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "ERROR:"; then
          echo "PASS: fdb syslog --last 0 rejected"
        else
          echo "FAIL: fdb syslog --last 0 — expected ERROR: in output" >&2
          exit 1
        fi

        echo "==> fdb syslog --follow (Ctrl-C exits 0)"
        # `dart run` launches a grandchild dart process; SIGINT to the wrapper
        # does not propagate. We send SIGINT to the wrapper AND to all child
        # `fdb.dart syslog` and `log stream` processes via pkill -P (children
        # of the wrapper) and pkill -f (matching command line).
        # /bin/kill / /usr/bin/pkill are required because Task's embedded
        # shell (mvdan/sh) does not implement these builtins.
        # We sleep 5s to give the process time to start; racy on slow runners.
        {{.FDB}} syslog --follow &
        FDB_PID=$!
        sleep 5
        /bin/kill -INT "$FDB_PID" 2>/dev/null || true
        /usr/bin/pkill -INT -P "$FDB_PID" 2>/dev/null || true
        /usr/bin/pkill -INT -f "fdb.dart syslog" 2>/dev/null || true
        # Allow up to 5s for graceful shutdown, then force kill if needed.
        for _ in 1 2 3 4 5; do
          if ! /bin/ps -p "$FDB_PID" >/dev/null 2>&1; then break; fi
          sleep 1
        done
        if /bin/ps -p "$FDB_PID" >/dev/null 2>&1; then
          /bin/kill -KILL "$FDB_PID" 2>/dev/null || true
          /usr/bin/pkill -KILL -P "$FDB_PID" 2>/dev/null || true
          /usr/bin/pkill -KILL -f "fdb.dart syslog" 2>/dev/null || true
          /usr/bin/pkill -KILL -f "log stream" 2>/dev/null || true
        fi
        wait $FDB_PID 2>/dev/null
        EXIT=$?
        # SIGINT-handled exit is 0 (graceful) or 130 (uncaught); SIGKILL exits
        # are 137 or 143. We accept any of these since the test's purpose is
        # to verify --follow streams and stops on signal, not the specific code.
        if [ $EXIT -eq 0 ] || [ $EXIT -eq 130 ] || [ $EXIT -eq 137 ] || [ $EXIT -eq 143 ]; then
          echo "PASS: fdb syslog --follow exited cleanly after signal (exit=$EXIT)"
        else
          echo "FAIL: fdb syslog --follow exited $EXIT after signal" >&2
          exit 1
        fi

  test:tree:
    desc: Inspect widget tree
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Inspecting widget tree"
        OUTPUT=$({{.FDB}} tree --depth 5 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb tree exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -qi "Scaffold\|MaterialApp\|FdbTest"; then
          echo "PASS: fdb tree"
        else
          echo "FAIL: fdb tree - no recognizable widgets in output" >&2
          exit 1
        fi

  test:screenshot:
    desc: Take a screenshot
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Taking screenshot"
        OUTPUT=$({{.FDB}} screenshot 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb screenshot exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SCREENSHOT_SAVED"; then
          echo "PASS: fdb screenshot"
        else
          echo "FAIL: fdb screenshot - SCREENSHOT_SAVED not found" >&2
          exit 1
        fi

  test:deeplink:
    desc: Open a deep link URL on the device
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Opening deep link"
        OUTPUT=$({{.FDB}} deeplink "fdbtest://test/hello?param=value&other=123" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb deeplink exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "DEEPLINK_OPENED="; then
          echo "PASS: fdb deeplink"
        else
          echo "FAIL: fdb deeplink - DEEPLINK_OPENED= not found in output" >&2
          exit 1
        fi

  test:select:
    desc: Toggle widget selection mode on and off
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Enabling selection mode"
        OUTPUT=$({{.FDB}} select on 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb select on exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SELECTION_MODE=ON"; then
          echo "PASS: fdb select on"
        else
          echo "FAIL: fdb select on - SELECTION_MODE=ON not found" >&2
          exit 1
        fi

        echo "==> Disabling selection mode"
        OUTPUT=$({{.FDB}} select off 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb select off exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SELECTION_MODE=OFF"; then
          echo "PASS: fdb select off"
        else
          echo "FAIL: fdb select off - SELECTION_MODE=OFF not found" >&2
          exit 1
        fi

  test:describe:
    desc: Describe the current screen (interactive elements + text)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Describing current screen"
        OUTPUT=$({{.FDB}} describe 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb describe exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "INTERACTIVE:"; then
          echo "PASS: fdb describe"
        else
          echo "FAIL: fdb describe - INTERACTIVE: not found in output" >&2
          exit 1
        fi

  test:describe-grid:
    desc: Verify fdb describe returns off-screen GridView children
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Navigating to Grid Describe Test screen"
        {{.FDB}} scroll-to --key "go_to_grid_describe_test" >/dev/null 2>&1 || true
        if ! {{.FDB}} tap --key "go_to_grid_describe_test" >/dev/null 2>&1; then
          echo "FAIL: could not navigate to grid describe screen (fdb tap --key go_to_grid_describe_test failed)" >&2
          exit 1
        fi
        sleep 1

        echo "==> Describing grid screen"
        OUTPUT=$({{.FDB}} describe 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb describe (grid) exited with code $EXIT_CODE" >&2
          exit 1
        fi

        # Grid section: 50 items (Item 0 .. Item 49). Assert items 40+ appear
        # to ensure off-screen surfacing works even on large-screen devices.
        if echo "$OUTPUT" | grep -q "grid_item_4[0-9]"; then
          echo "PASS: fdb describe surfaces off-screen GridView children"
        else
          echo "FAIL: fdb describe did not surface off-screen GridView children (grid_item_40+)" >&2
          exit 1
        fi

        # List section: 200 items (List Item 0 .. List Item 199). These are in
        # a SliverList with a SliverChildListDelegate and are never visible on
        # first render — exercises _collectUnbuiltDelegateWidgets for list slivers.
        # Cap arithmetic: 50 grid + 150 list (items 0–149) = 200 total.
        # Assert items 120–149 appear — within cap and beyond any screen size.
        if echo "$OUTPUT" | grep -q "list_item_1[2-4][0-9]"; then
          echo "PASS: fdb describe surfaces off-screen SliverList children"
        else
          echo "FAIL: fdb describe did not surface off-screen SliverList children (list_item_120+)" >&2
          exit 1
        fi

        echo "==> Navigating back"
        # fdb back may return non-zero if the OS already popped the route
        # (e.g. Android system back gesture fired during the describe call).
        # The core assertions above are what matter — treat back failure as a
        # warning, not a test failure.
        {{.FDB}} back 2>&1 || echo "INFO: fdb back returned non-zero (already at root — ignored)"

  test:tap:
    desc: Tap a widget by text selector
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Tapping increment button by key"
        OUTPUT=$({{.FDB}} tap --key "increment_button" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb tap exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "TAPPED="; then
          echo "PASS: fdb tap"
        else
          echo "FAIL: fdb tap - TAPPED= not found in output" >&2
          exit 1
        fi

  test:double-tap:
    desc: Double-tap a widget by selector and coordinates
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}echo "macos"{{end}}'
    cmds:
      - |
        assert_double_tap_output() {
          local output="$1"
          if echo "$output" | grep -Eq 'DOUBLE_TAPPED=[^ ]+ X=-?[0-9]+(\.[0-9]+)? Y=-?[0-9]+(\.[0-9]+)?'; then
            return 0
          fi
          echo "FAIL: fdb double-tap - expected DOUBLE_TAPPED=<WidgetType> X=<x> Y=<y>" >&2
          exit 1
        }

        assert_double_tap_summary() {
          local scenario="$1"
          local expected_summary="$2"
          # Scroll the double_tap_summary text into view before describing — the
          # home page is tall enough that the summary may be off-screen after
          # buttons were added above it.
          {{.FDB}} scroll-to --key double_tap_summary >/dev/null 2>&1 || true
          for _ in $(seq 1 20); do
            DESCRIBE_OUTPUT=$({{.FDB}} describe 2>&1)
            DESCRIBE_EXIT_CODE=$?
            echo "$DESCRIBE_OUTPUT"
            if [ $DESCRIBE_EXIT_CODE -ne 0 ]; then
              echo "FAIL: fdb describe after $scenario exited with code $DESCRIBE_EXIT_CODE" >&2
              exit 1
            fi
            if echo "$DESCRIBE_OUTPUT" | grep -q "$expected_summary"; then
              return 0
            fi
            sleep 0.5
          done
          echo "FAIL: fdb double-tap - expected summary '$expected_summary' after $scenario" >&2
          exit 1
        }

        assert_double_tap_summary_changed() {
          local scenario="$1"
          # Scroll the double_tap_summary text into view before describing.
          {{.FDB}} scroll-to --key double_tap_summary >/dev/null 2>&1 || true
          for _ in $(seq 1 20); do
            DESCRIBE_OUTPUT=$({{.FDB}} describe 2>&1)
            DESCRIBE_EXIT_CODE=$?
            echo "$DESCRIBE_OUTPUT"
            if [ $DESCRIBE_EXIT_CODE -ne 0 ]; then
              echo "FAIL: fdb describe after $scenario exited with code $DESCRIBE_EXIT_CODE" >&2
              exit 1
            fi
            if echo "$DESCRIBE_OUTPUT" | grep -q 'Double tap summary:' && ! echo "$DESCRIBE_OUTPUT" | grep -q 'Double tap summary: primary=0 secondary=0'; then
              return 0
            fi
            sleep 0.5
          done
          echo "FAIL: fdb double-tap - expected summary to change after $scenario" >&2
          exit 1
        }

        assert_double_tap_error() {
          local output="$1"
          local expected_error="$2"
          if echo "$output" | grep -q "$expected_error"; then
            return 0
          fi
          echo "FAIL: fdb double-tap - expected error '$expected_error'" >&2
          exit 1
        }

        extract_coords() {
          local output="$1"
          echo "$output" | sed -n 's/.*DOUBLE_TAPPED=.* X=\([^ ]*\) Y=\([^ ]*\).*/\1,\2/p'
        }

        is_macos_device() {
          [ "{{.DEVICE}}" = "macos" ]
        }

        relaunch_test_app() {
          echo "==> Launching test app on device: {{.DEVICE}}"
          {{.FDB}} kill >/dev/null 2>&1 || true
          OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "FAIL: fdb launch for double-tap exited with code $EXIT_CODE" >&2
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -q 'APP_STARTED'; then
            echo "FAIL: fdb launch for double-tap - APP_STARTED not found in output" >&2
            exit 1
          fi

          READY=0
          for _ in $(seq 1 20); do
            if {{.FDB}} tree --depth 1 >/dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 0.5
          done

          if [ $READY -ne 1 ]; then
            echo "FAIL: fdb launch for double-tap - app did not become ready" >&2
            exit 1
          fi
        }

        relaunch_test_app

        echo "==> Double-tapping target by key"
        set +e
        KEY_OUTPUT=$({{.FDB}} double-tap --key "double_tap_target" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$KEY_OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb double-tap --key exited with code $EXIT_CODE" >&2
          exit 1
        fi
        assert_double_tap_output "$KEY_OUTPUT"
        assert_double_tap_summary '--key' 'Double tap summary: primary=1 secondary=0'

        COORDS=$(extract_coords "$KEY_OUTPUT")
        if [ -z "$COORDS" ]; then
          echo "FAIL: fdb double-tap - could not extract coordinates from --key output" >&2
          exit 1
        fi
        X=$(echo "$COORDS" | sed 's/,.*//')
        Y=$(echo "$COORDS" | sed 's/.*,//')

        relaunch_test_app

        echo "==> Double-tapping target by --text with --index 0"
        set +e
        TEXT_OUTPUT=$({{.FDB}} double-tap --text "Double Tap Target" --index 0 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$TEXT_OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb double-tap --text --index 0 exited with code $EXIT_CODE" >&2
          exit 1
        fi
        assert_double_tap_output "$TEXT_OUTPUT"
        assert_double_tap_summary '--text/--index 0' 'Double tap summary: primary=1 secondary=0'
        relaunch_test_app

        echo "==> Double-tapping target by --text with --index 1"
        if is_macos_device; then
          echo "SKIP: macOS duplicate-text index scenario is not stable in the desktop viewport; exercising --index on widget type and mobile targets instead"
        else
          # Scroll the secondary target into the viewport — the home page may be
          # tall enough that double_tap_target_secondary is below the fold on
          # smaller-screen devices.
          {{.FDB}} scroll-to --key double_tap_target_secondary >/dev/null 2>&1 || true
          set +e
          INDEX_OUTPUT=$({{.FDB}} double-tap --text "Double Tap Target" --index 1 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$INDEX_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "FAIL: fdb double-tap --text/--index exited with code $EXIT_CODE" >&2
            exit 1
          fi
          assert_double_tap_output "$INDEX_OUTPUT"
          assert_double_tap_summary_changed '--text/--index 1'
        fi

        relaunch_test_app

        echo "==> Double-tapping target by --type Container --index 0"
        set +e
        TYPE_OUTPUT=$({{.FDB}} double-tap --type "Container" --index 0 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$TYPE_OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb double-tap --type exited with code $EXIT_CODE" >&2
          exit 1
        fi
        assert_double_tap_output "$TYPE_OUTPUT"
        assert_double_tap_summary '--type/--index 0' 'Double tap summary: primary=1 secondary=0'

        relaunch_test_app

        echo "==> Double-tapping target by --x/--y"
        set +e
        XY_OUTPUT=$({{.FDB}} double-tap --x "$X" --y "$Y" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$XY_OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb double-tap --x/--y exited with code $EXIT_CODE" >&2
          exit 1
        fi
        assert_double_tap_output "$XY_OUTPUT"
        assert_double_tap_summary '--x/--y' 'Double tap summary: primary=1 secondary=0'

        relaunch_test_app

        echo "==> Double-tapping target by --at"
        set +e
        AT_OUTPUT=$({{.FDB}} double-tap --at "$X,$Y" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$AT_OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb double-tap --at exited with code $EXIT_CODE" >&2
          exit 1
        fi
        assert_double_tap_output "$AT_OUTPUT"
        assert_double_tap_summary '--at' 'Double tap summary: primary=1 secondary=0'
        echo "PASS: fdb double-tap"

