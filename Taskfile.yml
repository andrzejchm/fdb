          echo "PASS: fdb scroll-to (lazy list by key)"
        else
          echo "FAIL: fdb scroll-to (lazy list by key) - SCROLLED_TO= not found in output" >&2
          exit 1
        fi

        sleep 1

        # ---------------------------------------------------------------
