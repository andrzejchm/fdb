        fi

  test:native-view-tap:
    desc: Verify fdb tap --at reaches native UI (WebView on Android, UIAlertController on iOS)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        # Platform-aware test:
        #   Android — WebView runs in-process; tap --at must reach the HTML button
        #   iOS sim — WKWebView is cross-process (cannot reach via in-process tap),
        #             so we test UIAlertController dismissal instead, which is the
        #             canonical iOS use-case for native-tap
        #   macOS  — webview_flutter doesn't support macOS; we verify --at delivers
        #            real taps to a Flutter widget via counter increment.
        PLATFORM=$(cat .fdb/platform.txt 2>/dev/null | awk '{print $1}' || echo "")
        echo "==> [native-view-tap] Detected platform: $PLATFORM"

        if [ "$PLATFORM" = "darwin" ] || [ "$PLATFORM" = "macos" ] || [ "$PLATFORM" = "macOS" ]; then
          echo "==> [native-view-tap] macOS path — verify --at delivers real taps to Flutter widget"

          # Use the increment FAB which has a counter that's logged in the heartbeat.
          # First reset state with a hot restart.
          {{.FDB}} restart >/dev/null 2>&1
          sleep 6

          # Get FAB position via --key (also gives us a baseline tap)
          POS=$({{.FDB}} tap --key increment_button 2>&1 | tail -1)
          echo "$POS"
          X=$(echo "$POS" | sed -n 's/.*X=\([0-9.]*\).*/\1/p')
          Y=$(echo "$POS" | sed -n 's/.*Y=\([0-9.]*\).*/\1/p')
          if [ -z "$X" ] || [ -z "$Y" ]; then
            echo "FAIL: could not determine FAB position" >&2
            exit 1
          fi

          # Tap 5 times via --at and verify counter increased by 5.
          # Counter is 1 after the --key tap above; --at taps should bring it to 6.
          for i in 1 2 3 4 5; do
            {{.FDB}} tap --at "$X,$Y" >/dev/null 2>&1
          done
          sleep 6

          COUNTER=$({{.FDB}} logs --last 3 2>&1 | grep -oE "counter=[0-9]+" | tail -1 | cut -d= -f2)
          echo "==> Counter after 1 --key + 5 --at taps: $COUNTER (expected 6)"
          if [ "$COUNTER" = "6" ]; then
            echo "PASS: fdb tap --at delivers real taps to Flutter widgets on macOS"
            exit 0
          fi

          echo "FAIL: counter is $COUNTER, expected 6 — --at taps did not register" >&2
          exit 1
        fi

        if [ "$PLATFORM" = "ios" ] || [ "$PLATFORM" = "iOS" ]; then
          echo "==> [native-view-tap] iOS path — verify UIAlertController dismissal"

          # Show alert
          {{.FDB}} scroll-to --key "show_native_alert" >/dev/null 2>&1 || true
          ALERT_TAP=$({{.FDB}} tap --key "show_native_alert" 2>&1)
          echo "$ALERT_TAP"
          sleep 1

          # The alert is centered; Confirm is right half. Use a reasonable center
          # based on common iPhone widths (~390-430 logical points).
          # Alert is roughly at y=470-510 on a 14/15/16/17 Pro.
          # Confirm button center is around x=270, y=488 on iPhone 17 Pro / 14 Pro.
          echo "==> [native-view-tap] Tap Confirm button via --at"
          set +e
          TAP_OUTPUT=$({{.FDB}} tap --at 269,488 2>&1)
          TAP_EXIT=$?
          set -e
          echo "$TAP_OUTPUT"
          if [ $TAP_EXIT -ne 0 ]; then
            echo "FAIL: fdb tap --at failed on UIAlertController" >&2
            exit 1
          fi

          sleep 1
          echo "==> [native-view-tap] Verify alert was confirmed"
          for i in $(seq 1 10); do
            DESCRIBE=$({{.FDB}} describe 2>&1)
            if echo "$DESCRIBE" | grep -q "Native alert: CONFIRMED"; then
              echo "PASS: fdb tap --at dismissed UIAlertController via Confirm button"
              exit 0
            fi
            sleep 0.5
          done

          echo "FAIL: UIAlertController never showed CONFIRMED — native tap did not reach the alert" >&2
          echo "$DESCRIBE"
          exit 1
        fi

        # Android (and others where WebView is in-process)
        echo "==> [native-view-tap] Navigate to native view test screen"
        {{.FDB}} scroll-to --key "go_to_native_view_test" >/dev/null 2>&1 || true
        OUTPUT=$({{.FDB}} tap --key "go_to_native_view_test" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: could not navigate to native view test screen" >&2
          exit 1
        fi

        # Wait for WebView to load
        sleep 3

        echo "==> [native-view-tap] Take screenshot to locate WebView button"
        {{.FDB}} screenshot >/dev/null 2>&1 || true

        echo "==> [native-view-tap] Confirm fdb tap --key cannot reach the WebView button"
        set +e
        KEY_OUTPUT=$({{.FDB}} tap --key "native_webview_button" --timeout 2 2>&1)
        KEY_EXIT=$?
        set -e
        echo "$KEY_OUTPUT"
        if [ $KEY_EXIT -eq 0 ]; then
          echo "FAIL: expected --key to fail for native WebView button, but it succeeded" >&2
          exit 1
        fi
        echo "PASS: --key correctly cannot reach native WebView button"

        echo "==> [native-view-tap] Confirm status is not yet tapped"
        DESCRIBE=$({{.FDB}} describe 2>&1)
        echo "$DESCRIBE"
        if echo "$DESCRIBE" | grep -q "WebView title: TAPPED"; then
          echo "FAIL: status already shows TAPPED before we tapped" >&2
          exit 1
        fi

        echo "==> [native-view-tap] Locate status bar bottom to compute WebView center"
        # Tap the status text widget to get its Y coordinate — that tells us where
        # the AppBar bottom is. The WebView fills the rest of the screen.
        # We then tap at (horizontal_center, appbar_bottom + webview_height/2).
        STATUS_TAP=$({{.FDB}} tap --key "native_tap_status_text" 2>&1)
        echo "$STATUS_TAP"
        STATUS_Y=$(echo "$STATUS_TAP" | sed -n 's/.*Y=\([0-9.]*\).*/\1/p' | head -1)
        # Estimate screen height from device (most phones 800-900 logical pts)
        # WebView starts just below status text (~20pt below its center).
        # Button is centered in the WebView vertically.
        # Approximate: tap_y = status_y + (screen_height - status_y) / 2
        # Use bc for floating point; default to 500 if unavailable.
        if [ -n "$STATUS_Y" ]; then
          APPBAR_BOTTOM=$(echo "$STATUS_Y + 20" | bc 2>/dev/null || echo "165")
          # Assume screen height ~853pt (typical), webview fills rest
          TAP_Y=$(echo "($APPBAR_BOTTOM + 853) / 2" | bc 2>/dev/null || echo "510")
        else
          TAP_Y=510
        fi
        echo "==> Using tap_y=$TAP_Y (appbar_bottom=${APPBAR_BOTTOM:-unknown})"

        echo "==> [native-view-tap] Tap WebView button via --at (native injection)"
        set +e
        TAP_OUTPUT=$({{.FDB}} tap --at 200,$TAP_Y 2>&1)
        TAP_EXIT=$?
        set -e
        echo "$TAP_OUTPUT"
        if [ $TAP_EXIT -ne 0 ]; then
          echo "FAIL: fdb tap --at failed on native view" >&2
          exit 1
        fi

        echo "==> [native-view-tap] Wait for page title to update"
        sleep 1

        echo "==> [native-view-tap] Verify WebView button was tapped"
        for i in $(seq 1 10); do
          DESCRIBE=$({{.FDB}} describe 2>&1)
          echo "$DESCRIBE"
          if echo "$DESCRIBE" | grep -q "WebView title: TAPPED"; then
            echo "PASS: fdb tap --at successfully tapped native WebView button"
            # Navigate back
            {{.FDB}} back >/dev/null 2>&1 || true
            exit 0
          fi
          sleep 0.5
        done

        echo "FAIL: WebView title never changed to TAPPED — native tap did not reach WebView" >&2
        {{.FDB}} back >/dev/null 2>&1 || true
        exit 1

  test:native-tap:
    desc: Tap native UI elements via adb (Android) or xcrun simctl (iOS simulator)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> [native-tap] --at with valid coordinates"
        PLATFORM=$(cat .fdb/platform.txt 2>/dev/null | awk '{print $1}' || echo "")

        # Determine a safe coordinate that is always on screen (center-ish)
        X=200
        Y=400

        set +e
        OUTPUT=$({{.FDB}} native-tap --at "$X,$Y" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"

        if echo "$OUTPUT" | grep -q "ERROR: native-tap is not yet supported on physical iOS"; then
          echo "SKIP: physical iOS — native-tap not yet supported (see fdb-6sz)"
        elif echo "$OUTPUT" | grep -q "ERROR: native-tap is not supported on macOS"; then
          echo "SKIP: macOS — native-tap not supported (use 'fdb tap --at' instead)"
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb native-tap exited with code $EXIT_CODE" >&2
          exit 1
        else
          if echo "$OUTPUT" | grep -q "NATIVE_TAPPED="; then
            echo "PASS: fdb native-tap --at"
          else
            echo "FAIL: fdb native-tap --at — NATIVE_TAPPED= not found in output" >&2
            exit 1
          fi
        fi

        echo "==> [native-tap] --at with invalid format"
        set +e
        OUTPUT=$({{.FDB}} native-tap --at "abc,def" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ $EXIT_CODE -eq 0 ]; then
          echo "FAIL: fdb native-tap --at abc,def should have failed" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q 'ERROR: Invalid --at value'; then
          echo "PASS: fdb native-tap --at invalid format"
        else
          echo "FAIL: fdb native-tap --at invalid format — expected ERROR: Invalid --at value" >&2
          exit 1
        fi

        echo "==> [native-tap] missing --at"
        set +e
        OUTPUT=$({{.FDB}} native-tap 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ $EXIT_CODE -eq 0 ]; then
          echo "FAIL: fdb native-tap with no args should have failed" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q 'ERROR:'; then
          echo "PASS: fdb native-tap missing --at"
        else
          echo "FAIL: fdb native-tap missing --at — expected ERROR: output" >&2
          exit 1
        fi

  test:app-died:
    desc: "Verify fdb exits with APP_DIED and non-zero code when the app process is killed"
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        echo "==> [app-died] Ensuring a fresh app session on device {{.DEVICE}}"
        # Always kill and relaunch to guarantee we are on the correct device.
        # Reusing an existing session risks picking up a stale session from a
        # different platform (e.g. macOS session left over from a previous test
        # run when this invocation targets Android or iOS).
        {{.FDB}} kill 2>/dev/null || true
        sleep 1
        OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb launch exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q "APP_STARTED"; then
          echo "FAIL: fdb launch - APP_STARTED not found in output" >&2
          exit 1
        fi

        echo "==> [app-died] Waiting for app to be ready"
        # Pin --session-dir so the readiness probe doesn't auto-resolve to a
        # stale .fdb/ from another worktree higher up the directory tree.
        READY=0
        for _ in $(seq 1 60); do
          if {{.FDB}} --session-dir "$(pwd)/.fdb" tree --depth 1 >/dev/null 2>&1; then
            READY=1
            break
          fi
          sleep 1
        done
        if [ $READY -ne 1 ]; then
          echo "FAIL: app did not become ready in time" >&2
          exit 1
        fi

        # Kill the app process using the appropriate mechanism per platform.
        # On macOS desktop: fdb.app_pid holds the real macOS app binary PID — kill it
        #   directly with kill -9, then also kill flutter-tools to prevent auto-restart.
        # On iOS simulator: the app runs inside Simulator.app; fdb.app_pid is a device-
        #   namespace PID not visible on the macOS host — use xcrun simctl terminate.
        # On Android: same device-namespace caveat — use adb shell am force-stop.
        PLATFORM=$(cat .fdb/platform.txt 2>/dev/null | awk '{print $1}' || echo "")
        DEVICE_ID=$(cat .fdb/device.txt 2>/dev/null || echo "")
        echo "==> [app-died] Platform=$PLATFORM Device=$DEVICE_ID"

        if [ "$PLATFORM" = "ios" ] || [ "$PLATFORM" = "iOS" ]; then
          echo "==> [app-died] iOS simulator — terminating via simctl"
          APP_PID=$(cat .fdb/fdb.app_pid 2>/dev/null || echo "")
          BUNDLE_ID=""
          if [ -n "$APP_PID" ]; then
            BUNDLE_ID=$(xcrun simctl spawn "$DEVICE_ID" launchctl list 2>/dev/null \
              | grep "^$APP_PID" \
              | grep "UIKitApplication:" \
              | sed 's/.*UIKitApplication:\([^[]*\).*/\1/' \
              | head -1)
          fi
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID=$(xcrun simctl spawn "$DEVICE_ID" launchctl list 2>/dev/null \
              | grep "UIKitApplication:" \
              | sed 's/.*UIKitApplication:\([^[]*\).*/\1/' \
              | head -1)
          fi
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID=$(xcrun simctl listapps "$DEVICE_ID" 2>/dev/null \
              | grep -A1 'CFBundleName = "test_app"' \
              | grep CFBundleIdentifier \
              | sed 's/.*= "\(.*\)";/\1/' \
              | head -1)
          fi
          if [ -z "$BUNDLE_ID" ]; then
            echo "SKIP: could not determine bundle ID on iOS simulator — skipping app-died test" >&2
            exit 0
          fi
          echo "  BundleID=$BUNDLE_ID"
          xcrun simctl terminate "$DEVICE_ID" "$BUNDLE_ID" 2>&1 || true

        elif [ "$PLATFORM" = "android" ] || echo "$PLATFORM" | grep -qi "android"; then
          echo "==> [app-died] Android — force-stopping via adb"
          PACKAGE=$(adb -s "$DEVICE_ID" shell pm list packages 2>/dev/null \
            | grep -i "test.app\|testapp\|fdb.test" \
            | sed 's/package://' \
            | head -1 | tr -d '\r')
          if [ -z "$PACKAGE" ]; then
            echo "SKIP: could not determine package name on Android — skipping app-died test" >&2
            exit 0
          fi
          echo "  Package=$PACKAGE"
          adb -s "$DEVICE_ID" shell am force-stop "$PACKAGE" 2>&1 || true

        else
          # macOS desktop (darwin): fdb.app_pid is a real macOS host PID — kill it directly.
          # Also kill flutter-tools to prevent it from auto-restarting the app.
          # Use /bin/kill explicitly: Task's embedded shell (mvdan/sh) does not
          # implement the `kill` builtin and does not fall back to the external
          # binary, so a bare `kill` call fails with "unimplemented builtin".
          APP_PID=$(cat .fdb/fdb.app_pid 2>/dev/null || echo "")
          if [ -n "$APP_PID" ]; then
            echo "==> [app-died] Killing app VM process PID=$APP_PID"
            /bin/kill -9 "$APP_PID" 2>/dev/null || true
            TOOLS_PID=$(cat .fdb/fdb.pid 2>/dev/null || echo "")
            if [ -n "$TOOLS_PID" ]; then
              echo "==> [app-died] Killing flutter-tools PID=$TOOLS_PID to prevent auto-restart"
              /bin/kill -9 "$TOOLS_PID" 2>/dev/null || true
            fi
          else
            echo "WARNING: .fdb/fdb.app_pid not found — falling back to killing fdb.pid" >&2
            TOOLS_PID=$(cat .fdb/fdb.pid 2>/dev/null || echo "")
            if [ -n "$TOOLS_PID" ]; then
              echo "==> [app-died] Killing flutter-tools PID=$TOOLS_PID (best-effort)"
              /bin/kill -9 "$TOOLS_PID" 2>/dev/null || true
            fi
          fi
        fi

        sleep 2

        echo "==> [app-died] Running fdb tap @1 — should exit non-zero with APP_DIED"
        # Pin the session dir explicitly. After the kill, this worktree's .fdb/fdb.pid
        # points to a dead process; without --session-dir, fdb auto-resolves by walking
        # up the directory tree and may attach to an unrelated live .fdb/ session in a
        # parent directory, masking the dead-app condition.
        set +e
        OUTPUT=$({{.FDB}} --session-dir "$(pwd)/.fdb" tap @1 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"

        if [ $EXIT_CODE -eq 0 ]; then
          echo "FAIL: fdb tap should have exited non-zero after app death, got 0" >&2
          exit 1
        fi

        if echo "$OUTPUT" | grep -q "APP_DIED"; then
          echo "PASS: APP_DIED detected in output"
        else
          echo "FAIL: APP_DIED not found in output (got exit $EXIT_CODE)" >&2
          exit 1
        fi

        if echo "$OUTPUT" | grep -q "See: fdb crash-report"; then
          echo "PASS: See: fdb crash-report hint present"
        else
          echo "FAIL: 'See: fdb crash-report' hint not found in output" >&2
          exit 1
        fi

        if echo "$OUTPUT" | grep -qE "Last [0-9]+ log lines:"; then
          echo "PASS: log tail present in APP_DIED output"
        else
          echo "FAIL: log tail 'Last N log lines:' not found in output" >&2
          exit 1
        fi

        echo "PASS: fdb app-died"

  test:kill:
    desc: Kill the running app
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        # test:app-died leaves the session cleaned up; relaunch so test:kill
        # has a live app to kill.
        echo "==> Launching app for kill test"
        LAUNCH_OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
        echo "$LAUNCH_OUTPUT"
        if ! echo "$LAUNCH_OUTPUT" | grep -q "APP_STARTED"; then
          echo "FAIL: fdb launch for kill test failed" >&2
          exit 1
        fi

        echo "==> Killing app"
        OUTPUT=$({{.FDB}} kill 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb kill exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "APP_KILLED"; then
          echo "PASS: fdb kill"
        else
          echo "FAIL: fdb kill - APP_KILLED not found" >&2
          exit 1
        fi

  test:status-stopped:
    desc: Verify status shows not running after kill
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Checking app is stopped"
        OUTPUT=$({{.FDB}} status 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "RUNNING=false"; then
          echo "PASS: fdb status (stopped)"
        else
          echo "FAIL: fdb status - expected RUNNING=false after kill" >&2
          exit 1
        fi

  test:status-after-interrupted-launch:
    desc: Verify status reports RUNNING=true when app is alive but PID file is missing (interrupted launch scenario)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Scenario: PID file missing but VM URI reachable (interrupted launch)"
        if [ ! -f .fdb/vm_uri.txt ]; then
          echo "FAIL: .fdb/vm_uri.txt not found — run test:launch first" >&2
          exit 1
        fi

        # Remove the PID file to simulate an interrupted fdb launch where
        # flutter run's --pid-file was not written before fdb was killed.
        ORIGINAL_PID=""
        if [ -f .fdb/fdb.pid ]; then
          ORIGINAL_PID=$(cat .fdb/fdb.pid)
          rm .fdb/fdb.pid
        fi

        restore_pid() {
          if [ -n "$ORIGINAL_PID" ]; then
            printf '%s' "$ORIGINAL_PID" > .fdb/fdb.pid
          fi
        }
        trap restore_pid EXIT

        OUTPUT=$({{.FDB}} status 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"

        restore_pid
        trap - EXIT

        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb status exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RUNNING=true"; then
          echo "PASS: fdb status correctly reports RUNNING=true via VM URI fallback"
        else
          echo "FAIL: fdb status - expected RUNNING=true when app is alive but PID file missing" >&2
          exit 1
        fi

        echo "==> Scenario: PID file points to dead process but VM URI reachable"
        ORIGINAL_PID=$(cat .fdb/fdb.pid 2>/dev/null || echo "")
        printf '999999' > .fdb/fdb.pid

        restore_stale_pid() {
          if [ -n "$ORIGINAL_PID" ]; then
            printf '%s' "$ORIGINAL_PID" > .fdb/fdb.pid
          else
            rm -f .fdb/fdb.pid
          fi
        }
        trap restore_stale_pid EXIT

        OUTPUT2=$({{.FDB}} status 2>&1)
        EXIT_CODE2=$?
        echo "$OUTPUT2"

        restore_stale_pid
        trap - EXIT

        if [ $EXIT_CODE2 -ne 0 ]; then
          echo "FAIL: fdb status exited with code $EXIT_CODE2" >&2
          exit 1
        fi
        if echo "$OUTPUT2" | grep -q "RUNNING=true"; then
          echo "PASS: fdb status correctly reports RUNNING=true via VM URI fallback (stale PID)"
        else
          echo "FAIL: fdb status - expected RUNNING=true when VM URI reachable but PID is stale" >&2
          exit 1
        fi

        echo "==> Scenario: VM URI present but service unreachable → RUNNING=false"
        ORIGINAL_PID3=$(cat .fdb/fdb.pid 2>/dev/null || echo "")
        ORIGINAL_URI3=$(cat .fdb/vm_uri.txt 2>/dev/null || echo "")
        if [ -z "$ORIGINAL_URI3" ]; then
          echo "FAIL: .fdb/vm_uri.txt not found — run test:launch first" >&2
          exit 1
        fi

        restore_scenario3() {
          if [ -n "$ORIGINAL_PID3" ]; then
            printf '%s' "$ORIGINAL_PID3" > .fdb/fdb.pid
          else
            rm -f .fdb/fdb.pid
          fi
          printf '%s' "$ORIGINAL_URI3" > .fdb/vm_uri.txt
        }
        trap restore_scenario3 EXIT

        # Remove PID file so only the VM URI path is exercised.
        rm -f .fdb/fdb.pid
        # Replace VM URI with a URI that refuses connections immediately.
        printf 'ws://127.0.0.1:1/' > .fdb/vm_uri.txt

        OUTPUT3=$({{.FDB}} status 2>&1)
        EXIT_CODE3=$?
        echo "$OUTPUT3"

        restore_scenario3
        trap - EXIT

        if [ $EXIT_CODE3 -ne 0 ]; then
          echo "FAIL: fdb status exited with code $EXIT_CODE3" >&2
          exit 1
        fi
        if echo "$OUTPUT3" | grep -q "RUNNING=false"; then
          echo "PASS: fdb status correctly reports RUNNING=false when VM URI present but unreachable"
        else
          echo "FAIL: fdb status - expected RUNNING=false when VM URI present but service unreachable" >&2
          exit 1
        fi

  test:session-dir:
    desc: Verify session dir auto-resolution by walking up from a subdirectory
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        # Ensure a clean state: launch the test app so a live .fdb/ exists.
        echo "==> Launching test app for session-dir walk-up test"
        cd "{{.TEST_APP}}"
        OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb launch exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q "APP_STARTED"; then
          echo "FAIL: fdb launch - APP_STARTED not found in output" >&2
          exit 1
        fi

        # ---------------------------------------------------------------
        # Scenario 1: CWD is project root — works as before (baseline).
        # ---------------------------------------------------------------
        echo "==> Scenario 1: CWD is project root — status should work"
        OUTPUT=$({{.FDB}} status 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "RUNNING=true"; then
          echo "PASS: Scenario 1 - status from project root"
        else
          echo "FAIL: Scenario 1 - expected RUNNING=true from project root" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi

        # ---------------------------------------------------------------
        # Scenario 2: CWD is a subdirectory — walk-up finds .fdb/.
        # ---------------------------------------------------------------
        echo "==> Scenario 2: CWD is subdirectory — walk-up finds .fdb/"
        mkdir -p "{{.TEST_APP}}/lib/features/checkout"
        OUTPUT=$(cd "{{.TEST_APP}}/lib/features/checkout" && {{.FDB}} status 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: Scenario 2 - fdb status from subdirectory exited with code $EXIT_CODE" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RUNNING=true"; then
          echo "PASS: Scenario 2 - walk-up resolved session dir from subdirectory"
        else
          echo "FAIL: Scenario 2 - expected RUNNING=true from subdirectory (walk-up should find .fdb/)" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi
        # Verify the INFO line was emitted to stderr (stdout+stderr merged above).
        if echo "$OUTPUT" | grep -q "INFO: Using session dir from"; then
          echo "PASS: Scenario 2 - INFO line emitted when resolving from parent"
        else
          echo "FAIL: Scenario 2 - INFO: line not found in output" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi

        # ---------------------------------------------------------------
        # Scenario 3: --session-dir bypasses auto-resolution.
        # ---------------------------------------------------------------
        echo "==> Scenario 3: --session-dir flag bypasses auto-resolution"
        SESSION_DIR="{{.TEST_APP}}/.fdb"
        OUTPUT=$(cd /tmp && {{.FDB}} --session-dir "$SESSION_DIR" status 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: Scenario 3 - fdb --session-dir status exited with code $EXIT_CODE" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RUNNING=true"; then
          echo "PASS: Scenario 3 - --session-dir flag works"
        else
          echo "FAIL: Scenario 3 - expected RUNNING=true with explicit --session-dir" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi

        # ---------------------------------------------------------------
        # Scenario 4: unrelated directory — clear error, exit 1.
        # ---------------------------------------------------------------
        echo "==> Scenario 4: unrelated directory — clear error"
        TMPDIR=$(mktemp -d)
        set +e
        OUTPUT=$(cd "$TMPDIR" && {{.FDB}} reload 2>&1)
        EXIT_CODE=$?
        set -e
        rm -rf "$TMPDIR"
        echo "$OUTPUT"
        if [ "$EXIT_CODE" -ne 1 ]; then
          echo "FAIL: Scenario 4 - expected exit code 1, got $EXIT_CODE" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q "ERROR:"; then
          echo "FAIL: Scenario 4 - expected ERROR: message in output" >&2
          {{.FDB}} kill >/dev/null 2>&1 || true
          exit 1
        fi
        echo "PASS: Scenario 4 - exit 1 with ERROR: from unrelated directory"

        # ---------------------------------------------------------------
        # Scenario 5: fdb status with no running app — RUNNING=false, exit 0.
        # ---------------------------------------------------------------
        echo "==> Scenario 5: status with no running app"
        {{.FDB}} kill >/dev/null 2>&1 || true
        set +e
        OUTPUT=$({{.FDB}} status 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "FAIL: Scenario 5 - expected exit code 0, got $EXIT_CODE" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q "RUNNING=false"; then
          echo "FAIL: Scenario 5 - expected RUNNING=false when app not running" >&2
          exit 1
        fi
        echo "PASS: Scenario 5 - status returns RUNNING=false with exit 0 when app not running"

        # ---------------------------------------------------------------
        # Scenario 6: stale .fdb/ (dead PID, dir still on disk) — exit 1.
        # ---------------------------------------------------------------
        echo "==> Scenario 6: stale .fdb/ does not bypass exit-1 guard"
        # The app is already killed from Scenario 5; .fdb/ dir remains on disk.
        set +e
        OUTPUT=$({{.FDB}} reload 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        if [ "$EXIT_CODE" -ne 1 ]; then
          echo "FAIL: Scenario 6 - expected exit code 1, got $EXIT_CODE" >&2
          exit 1
        fi
        if ! echo "$OUTPUT" | grep -q "ERROR:"; then
          echo "FAIL: Scenario 6 - expected ERROR: message in output" >&2
          exit 1
        fi
        echo "PASS: Scenario 6 - stale .fdb/ correctly produces ERROR: and exit 1"

        # Clean up.
        {{.FDB}} kill >/dev/null 2>&1 || true
        echo "PASS: fdb session-dir walk-up"

  # ---------------------------------------------------------------------------
  # Cleanup
  # ---------------------------------------------------------------------------
  cleanup:
    desc: Force-kill any running fdb app and clean up temp files
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        {{.FDB}} kill 2>/dev/null || true
        rm -rf .fdb
        echo "Cleanup done"

  # ---------------------------------------------------------------------------
  # Full smoke test — runs all commands in sequence
  # ---------------------------------------------------------------------------
  smoke:
    desc: "Full end-to-end smoke test of all fdb commands"
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - task: cleanup
      - task: setup
      - defer:
          task: cleanup
      - task: test:devices
      - task: test:launch
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:launch-verbose
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:status
      - task: test:status-after-interrupted-launch
      - task: test:reload
      - task: test:restart
      - task: test:logs
      - task: test:logs-tag
      - task: test:syslog
      - task: test:tree
      - task: test:describe
      - task: test:describe-grid
      - task: test:screenshot
      - task: test:deeplink
      - task: test:native-view-tap
      - task: test:native-tap
      - task: test:select
      - task: test:tap
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:double-tap
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:longpress
      - task: test:tap-at
      - task: test:input
      - task: test:scroll
      - task: test:scroll-to
      - task: test:wait
      - task: test:swipe
      - task: test:back
      - task: test:clean
      - task: test:shared-prefs
      - task: test:app-died
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:kill
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:status-stopped
      - task: test:session-dir
        vars:
          DEVICE: '{{.DEVICE}}'

  # ---------------------------------------------------------------------------
  # Code quality — individual steps
  # ---------------------------------------------------------------------------
  format:
    desc: "Format code in fdb (lib/ bin/ test/) and fdb_helper (lib/)"
    cmds:
      - dart format --page-width 120 --trailing-commas preserve lib/ bin/ test/
      - cd packages/fdb_helper && dart format --page-width 120 --trailing-commas preserve lib/

  fix:
    desc: "Apply dart fix to fdb (lib/ bin/ test/) and fdb_helper (lib/)"
    cmds:
      - dart fix --apply lib/
      - dart fix --apply bin/
      - dart fix --apply test/
      - cd packages/fdb_helper && dart fix --apply lib/

  analyze:
    desc: "Run static analysis on fdb (lib/ bin/ test/) and fdb_helper"
    cmds:
      - dart analyze lib/ bin/ test/
      - cd packages/fdb_helper && flutter analyze --suppress-analytics

  test:unit:
    desc: "Run dart unit tests for fdb"
    cmds:
      - dart test

  # ---------------------------------------------------------------------------
  # Comprehensive local verification (format → fix → analyze → test)
  # ---------------------------------------------------------------------------
  verify:
    desc: "Run full verification: format, fix, analyze, test for fdb + fdb_helper. Logs saved to .task/logs/"
    silent: true
    vars:
      LOG_DIR: "{{.ROOT_DIR}}/.task/logs"
      FORMAT_LOG: "{{.ROOT_DIR}}/.task/logs/verify_format.log"
      FIX_LOG: "{{.ROOT_DIR}}/.task/logs/verify_fix.log"
      ANALYZE_LOG: "{{.ROOT_DIR}}/.task/logs/verify_analyze.log"
      TEST_LOG: "{{.ROOT_DIR}}/.task/logs/verify_test.log"
    cmds:
      - mkdir -p "{{.LOG_DIR}}"
      - |
        run_step() {
          STEP=$1; CMD=$2; LOG=$3
          printf "%-12s" "$STEP"
          if eval "$CMD" > "$LOG" 2>&1; then
            echo "✓"
          else
            echo "✗  (see $LOG)"
            FAILED=1
          fi
        }
        FAILED=0
        run_step "FORMAT"   "task format"   "{{.FORMAT_LOG}}"
        run_step "FIX"      "task fix"      "{{.FIX_LOG}}"
        run_step "ANALYZE"  "task analyze"  "{{.ANALYZE_LOG}}"
        run_step "TEST"     "task test:unit" "{{.TEST_LOG}}"
        if [ "$FAILED" = "1" ]; then
          echo ""
          echo "VERIFY FAILED — check the log file(s) listed above for details."
          exit 1
        else
          echo ""
          echo "VERIFY PASSED"
        fi

  verify-quick:
    desc: "Run quick verification: format, fix, analyze (no tests) for fdb + fdb_helper. Logs saved to .task/logs/"
    silent: true
    vars:
      LOG_DIR: "{{.ROOT_DIR}}/.task/logs"
      FORMAT_LOG: "{{.ROOT_DIR}}/.task/logs/verify_format.log"
      FIX_LOG: "{{.ROOT_DIR}}/.task/logs/verify_fix.log"
      ANALYZE_LOG: "{{.ROOT_DIR}}/.task/logs/verify_analyze.log"
    cmds:
      - mkdir -p "{{.LOG_DIR}}"
      - |
        run_step() {
          STEP=$1; CMD=$2; LOG=$3
          printf "%-12s" "$STEP"
          if eval "$CMD" > "$LOG" 2>&1; then
            echo "✓"
          else
            echo "✗  (see $LOG)"
            FAILED=1
          fi
        }
        FAILED=0
        run_step "FORMAT"   "task format"   "{{.FORMAT_LOG}}"
        run_step "FIX"      "task fix"      "{{.FIX_LOG}}"
        run_step "ANALYZE"  "task analyze"  "{{.ANALYZE_LOG}}"
        if [ "$FAILED" = "1" ]; then
          echo ""
          echo "VERIFY FAILED — check the log file(s) listed above for details."
          exit 1
        else
          echo ""
          echo "VERIFY PASSED"
        fi

  # ---------------------------------------------------------------------------
  # Benchmark: fdb describe performance
  # ---------------------------------------------------------------------------
  bench:launch:
    desc: "Launch test app for benchmarking (set DEVICE or auto-detect)"
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        echo "==> Launching test app on: {{.DEVICE}}"
        {{.FDB}} launch --device "{{.DEVICE}}" 2>&1
        sleep 2

  bench:run:
    desc: "Run fdb describe benchmark (app must be running)"
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Running describe performance benchmark..."
        dart run {{.ROOT_DIR}}/bin/benchmark_describe.dart

  bench:
    desc: "Full describe benchmark: launch app then run benchmark"
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - task: bench:launch
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: bench:run
