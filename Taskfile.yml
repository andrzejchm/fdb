version: '3'

silent: true

vars:
  FDB: 'dart run {{.ROOT_DIR}}/bin/fdb.dart'
  TEST_APP: '{{.ROOT_DIR}}/example/test_app'

tasks:
  # ---------------------------------------------------------------------------
  # Setup
  # ---------------------------------------------------------------------------
  setup:
    desc: Install dependencies and prepare the test app
    cmds:
      - dart pub get
      - cmd: flutter pub get
        dir: 'packages/fdb_helper'
      - cmd: flutter pub get
        dir: '{{.TEST_APP}}'

  # ---------------------------------------------------------------------------
  # Device detection
  # ---------------------------------------------------------------------------
  detect-device:
    desc: Auto-detect a connected device ID (first device reported by fdb devices)
    cmds:
      - |
        DEVICE=$({{.FDB}} devices 2>/dev/null \
          | grep '^DEVICE_ID=' \
          | head -1 \
          | sed 's/DEVICE_ID=\([^ ]*\).*/\1/')
        if [ -z "$DEVICE" ]; then
          echo "ERROR: No device found. Start a simulator or connect a device." >&2
          exit 1
        fi
        echo "$DEVICE"

  # ---------------------------------------------------------------------------
  # Individual fdb command tests
  # ---------------------------------------------------------------------------
  test:devices:
    desc: "List connected devices"
    cmds:
      - |
        echo "==> Listing devices"
        OUTPUT=$({{.FDB}} devices 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb devices exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "DEVICE_ID="; then
          echo "PASS: fdb devices"
        else
          echo "FAIL: fdb devices - no DEVICE_ID= lines in output" >&2
          exit 1
        fi

  test:launch:
    desc: "Launch the test app on a device (set DEVICE or auto-detect)"
    dir: '{{.TEST_APP}}'
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - |
        echo "==> Launching test app on device: {{.DEVICE}}"
        OUTPUT=$({{.FDB}} launch --device "{{.DEVICE}}" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb launch exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "APP_STARTED"; then
          echo "PASS: fdb launch"
        else
          echo "FAIL: fdb launch - APP_STARTED not found in output" >&2
          exit 1
        fi

  test:status:
    desc: Check app status (expects a running app)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Checking app status"
        OUTPUT=$({{.FDB}} status 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "RUNNING=true"; then
          echo "PASS: fdb status"
        else
          echo "FAIL: fdb status - expected RUNNING=true" >&2
          exit 1
        fi

  test:reload:
    desc: Hot reload the running app
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Hot reloading"
        OUTPUT=$({{.FDB}} reload 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb reload exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RELOADED"; then
          echo "PASS: fdb reload"
        else
          echo "FAIL: fdb reload - RELOADED not found in output" >&2
          exit 1
        fi

  test:restart:
    desc: Hot restart the running app
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Hot restarting"
        OUTPUT=$({{.FDB}} restart 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb restart exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "RESTARTED"; then
          echo "PASS: fdb restart"
        else
          echo "FAIL: fdb restart - RESTARTED not found in output" >&2
          exit 1
        fi

  test:logs:
    desc: Read app logs
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Reading logs (last 10)"
        OUTPUT=$({{.FDB}} logs --last 10 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb logs exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb logs"

  test:logs-tag:
    desc: Read app logs filtered by tag
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Reading logs with --tag fdb_test"
        OUTPUT=$({{.FDB}} logs --tag fdb_test --last 10 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb logs --tag exited with code $EXIT_CODE" >&2
          exit 1
        fi
        echo "PASS: fdb logs --tag"

  test:tree:
    desc: Inspect widget tree
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Inspecting widget tree"
        OUTPUT=$({{.FDB}} tree --depth 5 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb tree exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -qi "Scaffold\|MaterialApp\|FdbTest"; then
          echo "PASS: fdb tree"
        else
          echo "FAIL: fdb tree - no recognizable widgets in output" >&2
          exit 1
        fi

  test:screenshot:
    desc: Take a screenshot
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Taking screenshot"
        OUTPUT=$({{.FDB}} screenshot 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb screenshot exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SCREENSHOT_SAVED"; then
          echo "PASS: fdb screenshot"
        else
          echo "FAIL: fdb screenshot - SCREENSHOT_SAVED not found" >&2
          exit 1
        fi

  test:deeplink:
    desc: Open a deep link URL on the device
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Opening deep link"
        OUTPUT=$({{.FDB}} deeplink "fdbtest://test/hello?param=value&other=123" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb deeplink exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "DEEPLINK_OPENED="; then
          echo "PASS: fdb deeplink"
        else
          echo "FAIL: fdb deeplink - DEEPLINK_OPENED= not found in output" >&2
          exit 1
        fi

  test:select:
    desc: Toggle widget selection mode on and off
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Enabling selection mode"
        OUTPUT=$({{.FDB}} select on 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb select on exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SELECTION_MODE=ON"; then
          echo "PASS: fdb select on"
        else
          echo "FAIL: fdb select on - SELECTION_MODE=ON not found" >&2
          exit 1
        fi

        echo "==> Disabling selection mode"
        OUTPUT=$({{.FDB}} select off 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb select off exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SELECTION_MODE=OFF"; then
          echo "PASS: fdb select off"
        else
          echo "FAIL: fdb select off - SELECTION_MODE=OFF not found" >&2
          exit 1
        fi

  test:describe:
    desc: Describe the current screen (interactive elements + text)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Describing current screen"
        OUTPUT=$({{.FDB}} describe 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb describe exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "INTERACTIVE:"; then
          echo "PASS: fdb describe"
        else
          echo "FAIL: fdb describe - INTERACTIVE: not found in output" >&2
          exit 1
        fi

  test:tap:
    desc: Tap a widget by text selector
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Tapping increment button by key"
        OUTPUT=$({{.FDB}} tap --key "increment_button" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb tap exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "TAPPED="; then
          echo "PASS: fdb tap"
        else
          echo "FAIL: fdb tap - TAPPED= not found in output" >&2
          exit 1
        fi

  test:longpress:
    desc: Long-press a widget by key selector
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Long-pressing increment button by key"
        OUTPUT=$({{.FDB}} longpress --key "increment_button" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb longpress exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "LONG_PRESSED="; then
          echo "PASS: fdb longpress"
        else
          echo "FAIL: fdb longpress - LONG_PRESSED= not found in output" >&2
          exit 1
        fi

  test:input:
    desc: Enter text into a field
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Entering text into test input"
        OUTPUT=$({{.FDB}} input --key "test_input" "hello fdb" 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb input exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "INPUT="; then
          echo "PASS: fdb input"
        else
          echo "FAIL: fdb input - INPUT= not found in output" >&2
          exit 1
        fi

  test:scroll:
    desc: Scroll the screen (direction mode and raw coordinate mode)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Scrolling down (direction mode)"
        OUTPUT=$({{.FDB}} scroll down 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb scroll exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SCROLLED="; then
          echo "PASS: fdb scroll (direction mode)"
        else
          echo "FAIL: fdb scroll - SCROLLED= not found in output" >&2
          exit 1
        fi

        echo "==> Scrolling with raw coordinates (--from/--to mode)"
        OUTPUT=$({{.FDB}} scroll --from 200,400 --to 200,100 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb scroll --from/--to exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SCROLLED=RAW"; then
          echo "PASS: fdb scroll (raw coordinate mode) - SCROLLED=RAW"
        else
          echo "FAIL: fdb scroll --from/--to - SCROLLED=RAW not found in output" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "FROM="; then
          echo "PASS: fdb scroll (raw coordinate mode) - FROM="
        else
          echo "FAIL: fdb scroll --from/--to - FROM= not found in output" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "TO="; then
          echo "PASS: fdb scroll (raw coordinate mode) - TO="
        else
          echo "FAIL: fdb scroll --from/--to - TO= not found in output" >&2
          exit 1
        fi

  test:swipe:
    desc: Swipe the screen
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Swiping left from screen center"
        OUTPUT=$({{.FDB}} swipe left 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb swipe exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "SWIPED="; then
          echo "PASS: fdb swipe"
        else
          echo "FAIL: fdb swipe - SWIPED= not found in output" >&2
          exit 1
        fi

  test:back:
    desc: Navigate back in the running app
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Hot restarting to reset UI state"
        {{.FDB}} restart >/dev/null 2>&1
        sleep 1
        echo "==> Navigating to details page first"
        TAP_OUT=$({{.FDB}} tap --key go_to_details 2>&1)
        echo "$TAP_OUT"
        sleep 1
        echo "==> Navigating back"
        OUTPUT=$({{.FDB}} back 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb back exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "POPPED"; then
          echo "PASS: fdb back"
        else
          echo "FAIL: fdb back - POPPED not found in output" >&2
          exit 1
        fi

  test:kill:
    desc: Kill the running app
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Killing app"
        OUTPUT=$({{.FDB}} kill 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        if [ $EXIT_CODE -ne 0 ]; then
          echo "FAIL: fdb kill exited with code $EXIT_CODE" >&2
          exit 1
        fi
        if echo "$OUTPUT" | grep -q "APP_KILLED"; then
          echo "PASS: fdb kill"
        else
          echo "FAIL: fdb kill - APP_KILLED not found" >&2
          exit 1
        fi

  test:status-stopped:
    desc: Verify status shows not running after kill
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        echo "==> Checking app is stopped"
        OUTPUT=$({{.FDB}} status 2>&1)
        echo "$OUTPUT"
        if echo "$OUTPUT" | grep -q "RUNNING=false"; then
          echo "PASS: fdb status (stopped)"
        else
          echo "FAIL: fdb status - expected RUNNING=false after kill" >&2
          exit 1
        fi

  # ---------------------------------------------------------------------------
  # Cleanup
  # ---------------------------------------------------------------------------
  cleanup:
    desc: Force-kill any running fdb app and clean up temp files
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        {{.FDB}} kill 2>/dev/null || true
        rm -rf .fdb
        echo "Cleanup done"

  # ---------------------------------------------------------------------------
  # Full smoke test — runs all commands in sequence
  # ---------------------------------------------------------------------------
  smoke:
    desc: "Full end-to-end smoke test of all fdb commands"
    vars:
      DEVICE:
        sh: '{{if .DEVICE}}echo "{{.DEVICE}}"{{else}}task detect-device{{end}}'
    cmds:
      - task: cleanup
      - task: setup
      - defer:
          task: cleanup
      - task: test:devices
      - task: test:launch
        vars:
          DEVICE: '{{.DEVICE}}'
      - task: test:status
      - task: test:reload
      - task: test:restart
      - task: test:logs
      - task: test:logs-tag
      - task: test:tree
      - task: test:describe
      - task: test:screenshot
      - task: test:deeplink
      - task: test:select
      - task: test:tap
      - task: test:longpress
      - task: test:input
      - task: test:scroll
      - task: test:swipe
      - task: test:back
      - task: test:kill
      - task: test:status-stopped

  # ---------------------------------------------------------------------------
  # Static analysis for fdb itself
  # ---------------------------------------------------------------------------
  analyze:
    desc: Run dart analyze on the fdb package
    cmds:
      - dart analyze
      - dart format --set-exit-if-changed .

  test:unit:
    desc: Run dart unit tests (when they exist)
    cmds:
      - dart test
