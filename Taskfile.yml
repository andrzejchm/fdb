  test:scroll-to:
    desc: Scroll until a widget is visible (comprehensive scenarios)
    dir: '{{.TEST_APP}}'
    cmds:
      - |
        # ---------------------------------------------------------------
        # Scenario 1: eager SingleChildScrollView — item off-screen at bottom
        # ---------------------------------------------------------------
        echo "==> [scroll-to] SingleChildScrollView — scroll to off-screen item by text"
        OUTPUT=$({{.FDB}} scroll-to --text "Extra item 10" 2>&1)
